<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude / Codex / DeepSeek Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: transparent;
    }
    #app {
      width: 240px; height: 185px;
      background: rgba(30, 30, 35, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 12px;
      color: #d0d0d0;
      display: flex; flex-direction: column; gap: 4px;
      user-select: none;
      cursor: grab;
    }
    .group-header {
      font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px;
      padding: 3px 0 1px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .group-header:first-of-type { padding-top: 0; }
    .section { display: flex; flex-direction: column; gap: 1px; }
    .label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .value { color: #e0e0e0; font-weight: 500; }
    .pacer { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .pacer.under { background: rgba(60, 120, 220, 0.2); color: #68f; }
    .pacer.onpace { background: rgba(50, 200, 100, 0.15); color: #6f6; }
    .pacer.over { background: rgba(220, 60, 60, 0.15); color: #e55; }
    .ds-status { display: flex; align-items: center; gap: 5px; padding-top: 2px; }
    .ds-indicator { width: 8px; height: 8px; border-radius: 50%; }
    .ds-indicator.peak { background: #e55; }
    .ds-indicator.offpeak { background: #6f6; }
    #app.claude-stale { opacity: 0.4; }
    .amber { color: #f5a623; }
    .diagnostic { position: absolute; bottom: 2px; left: 8px; right: 8px; font-size: 8px; color: #e55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
    #codex-section { display: none; padding-top: 2px; }
    #codex-section.codex-loading { border-left: 2px solid #f5a623; padding-left: 6px; }
    #codex-section.codex-unavailable { border-left: 2px solid #e55; padding-left: 6px; }
    #codex-section.codex-stale { border-left: 2px solid #f5a623; padding-left: 6px; }
    #codex-section.codex-stale #codex-windows { opacity: 0.45; }
    #codex-section.codex-unavailable .source-diagnostic { color: #f5a623; }
    .source-diagnostic { font-size: 9px; line-height: 11px; color: #e55; overflow-wrap: anywhere; }
    .codex-window { display: flex; flex-direction: column; gap: 1px; }
    .reset-text { font-size: 10px; color: #e0e0e0; }
  </style>
</head>
<body>
  <div id="app">
    <div class="group-header">CLAUDE</div>
    <div class="section">
      <div class="label">Session</div>
      <div class="row"><span class="value" id="session-pct">--%</span><span class="pacer" id="session-pacer"></span></div>
      <div class="row reset-text"><span id="session-reset">--</span></div>
    </div>
    <div class="section">
      <div class="label">Weekly</div>
      <div class="row"><span class="value" id="week-pct">--%</span><span class="pacer" id="week-pacer"></span></div>
      <div class="row reset-text"><span id="week-reset">--</span></div>
    </div>
    <div id="codex-section">
      <div class="group-header">CODEX</div>
      <div class="section" id="codex-windows"></div>
      <div class="source-diagnostic" id="codex-status"></div>
    </div>
    <div class="group-header">DEEPSEEK</div>
    <div class="ds-status">
      <span class="ds-indicator offpeak" id="ds-dot"></span>
      <span id="ds-label" style="font-size:10px">Off-peak</span>
      <span style="font-size:9px;color:#666;margin-left:auto" id="ds-next">--</span>
    </div>
    <div id="diagnostic" class="diagnostic"></div>
  </div>
  <script src="codex-format.js"></script>
  <script>
    (function() {
      var T = window.__TAURI__;
      if (!T) return;
      var win = T.window.getCurrentWindow();
      var currentWidgetHeight = 185;

      function resizeWidget(height) {
        if (height === currentWidgetHeight) return;
        currentWidgetHeight = height;
        T.core.invoke('resize_widget', { width: 240, height: height }).catch(function() {});
      }

      document.getElementById('app').addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        win.startDragging().catch(function(err) {
          document.getElementById('diagnostic').textContent = 'Drag error: ' + err;
          document.getElementById('diagnostic').style.display = 'block';
        });
        e.preventDefault();
      });

      function applyState(s) {
        document.getElementById('session-pct').textContent = s.session_pct || '--%';
        document.getElementById('week-pct').textContent = s.week_pct || '--%';
        document.getElementById('session-reset').textContent = s.session_reset || '';
        document.getElementById('week-reset').textContent = s.week_reset || '';

        var labels = { under: 'UNDER PACE', onpace: 'ON PACE', over: 'OVER PACE' };
        var sp = document.getElementById('session-pacer');
        if (s.session_pacing) {
          sp.textContent = labels[s.session_pacing] || s.session_pacing.toUpperCase();
          sp.className = 'pacer ' + s.session_pacing;
        } else { sp.textContent = ''; sp.className = 'pacer'; }

        var wp = document.getElementById('week-pacer');
        if (s.week_pacing) {
          wp.textContent = labels[s.week_pacing] || s.week_pacing.toUpperCase();
          wp.className = 'pacer ' + s.week_pacing;
        } else { wp.textContent = ''; wp.className = 'pacer'; }

        var codexSection = document.getElementById('codex-section');
        var codexVisible = !!s.codex_enabled;
        codexSection.style.display = codexVisible ? 'block' : 'none';
        if (codexVisible) {
          var windows = s.codex_windows || (s.codex_primary ? [s.codex_primary] : []);
          var container = document.getElementById('codex-windows');
          container.innerHTML = '';
          windows.forEach(function(window) {
            var row = document.createElement('div');
            row.className = 'codex-window';
            var label = document.createElement('span');
            label.className = 'label'; label.textContent = window.label;
            var top = document.createElement('div');
            top.className = 'row';
            var pct = document.createElement('span');
            pct.className = 'value'; pct.textContent = window.used_pct;
            var pace = document.createElement('span');
            pace.className = 'pacer';
            if (window.pacing) { pace.textContent = labels[window.pacing] || window.pacing.toUpperCase(); pace.className = 'pacer ' + window.pacing; }
            top.appendChild(pct); top.appendChild(pace);
            var reset = document.createElement('div');
            reset.className = 'row reset-text'; reset.textContent = codexFormatResetTime(window.reset);
            row.appendChild(label); row.appendChild(top); row.appendChild(reset); container.appendChild(row);
          });
          var statusText = s.codex_loading ? 'Loading…' : (s.codex_diagnostic || (!s.codex_available ? 'Unavailable' : ''));
          document.getElementById('codex-status').textContent = statusText;
          var diagnosticLines = statusText ? Math.max(1, Math.ceil(statusText.length / 36)) : 0;
          var desiredHeight = Math.min(420, 220 + (Math.max(windows.length, 1) * 42) + Math.max(0, diagnosticLines - 1) * 11);
          document.getElementById('app').style.height = desiredHeight + 'px';
          var codexStateClass = s.codex_loading ? 'codex-loading' : (s.codex_stale ? 'codex-stale' : (!s.codex_available ? 'codex-unavailable' : ''));
          codexSection.className = codexStateClass;
          resizeWidget(desiredHeight);
        } else {
          document.getElementById('app').style.height = '185px';
          codexSection.className = '';
          resizeWidget(185);
        }

        var dot = document.getElementById('ds-dot');
        if (s.deepseek_peak) {
          dot.className = 'ds-indicator peak';
          document.getElementById('ds-label').textContent = 'Peak ' + (s.deepseek_label || '');
        } else {
          dot.className = 'ds-indicator offpeak';
          document.getElementById('ds-label').textContent = 'Off-peak';
        }

        var dsNext = document.getElementById('ds-next');
        dsNext.textContent = s.next_transition || '';
        if (s.next_transition && /^(Next peak in|Off-peak until) \d+m$/.test(s.next_transition)) {
          dsNext.classList.add('amber');
        } else {
          dsNext.classList.remove('amber');
        }

        var a = document.getElementById('app');
        if (s.stale) { a.classList.add('claude-stale'); } else { a.classList.remove('claude-stale'); }
        a.style.opacity = s.stale ? '0.4' : String(s.widget_opacity ?? 0.92);

        var diagEl = document.getElementById('diagnostic');
        if (s.diagnostic) {
          diagEl.textContent = s.diagnostic;
          diagEl.style.display = 'block';
        } else {
          diagEl.style.display = 'none';
        }
      }

      // Fetch initial state immediately (solves race with event listener)
      T.core.invoke('get_initial_state').then(applyState);

      // Listen for subsequent Rust → frontend state updates
      T.event.listen('state-update', function(event) { applyState(event.payload); });
    })();
  </script>
</body>
</html>
