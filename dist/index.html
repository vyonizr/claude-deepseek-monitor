<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: transparent;
    }
    #app {
      width: 240px; height: 160px;
      background: rgba(30, 30, 35, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      color: #d0d0d0;
      display: flex; flex-direction: column; gap: 6px;
      user-select: none;
    }
    #titlebar {
      display: flex; justify-content: space-between; align-items: center;
      cursor: grab; padding: 2px 0 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #titlebar:active { cursor: grabbing; }
    #titlebar span { font-size: 10px; color: #888; font-weight: 500; letter-spacing: 0.3px; }
    .section { display: flex; flex-direction: column; gap: 2px; }
    .label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .value { color: #e0e0e0; font-weight: 500; }
    .pacer { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .pacer.under { background: rgba(50, 200, 100, 0.15); color: #6f6; }
    .pacer.onpace { background: rgba(200, 180, 50, 0.15); color: #dd5; }
    .pacer.over { background: rgba(220, 60, 60, 0.15); color: #e55; }
    .ds-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .ds-indicator { width: 8px; height: 8px; border-radius: 50%; }
    .ds-indicator.peak { background: #e55; }
    .ds-indicator.offpeak { background: #6f6; }
    .stale { opacity: 0.4; }
    .diagnostic { position: absolute; bottom: 2px; left: 8px; right: 8px; font-size: 8px; color: #e55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
  </style>
</head>
<body>
  <div id="app">
    <div id="titlebar"><span>CLAUDE / DEEPSEEK</span></div>
    <div class="section">
      <div class="label">Session</div>
      <div class="row"><span class="value" id="session-pct">--%</span><span class="pacer" id="session-pacer"></span></div>
      <div class="row" style="font-size:9px;color:#666"><span id="session-reset">--</span></div>
    </div>
    <div class="section">
      <div class="label">Weekly</div>
      <div class="row"><span class="value" id="week-pct">--%</span><span class="pacer" id="week-pacer"></span></div>
      <div class="row" style="font-size:9px;color:#666"><span id="week-reset">--</span></div>
    </div>
    <div id="diagnostic" class="diagnostic"></div>
    <div class="ds-status">
      <span class="ds-indicator offpeak" id="ds-dot"></span>
      <span id="ds-label" style="font-size:10px">Off-peak</span>
      <span style="font-size:9px;color:#666;margin-left:auto" id="ds-next">--</span>
    </div>
  </div>
  <script>
    // Drag support
    let isDragging = false, dragX, dragY;

    const titlebar = document.getElementById('titlebar');
    titlebar.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragX = e.screenX; dragY = e.screenY;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.screenX - dragX;
      const dy = e.screenY - dragY;
      window.__TAURI__?.window.getCurrentWindow().then(w => {
        w.setPosition(w.position.x + dx, w.position.y + dy);
      });
      dragX = e.screenX; dragY = e.screenY;
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    // Listen for state updates from Rust
    async function connect() {
      if (!window.__TAURI__) return;
      const { listen } = await import('@tauri-apps/api/event');
      await listen('state-update', (event) => {
        const s = event.payload;
        document.getElementById('session-pct').textContent = s.session_pct ?? '--%';
        document.getElementById('week-pct').textContent = s.week_pct ?? '--%';
        document.getElementById('session-reset').textContent = s.session_reset ?? '';
        document.getElementById('week-reset').textContent = s.week_reset ?? '';

        const sp = document.getElementById('session-pacer');
        if (s.session_pacing) {
          sp.textContent = s.session_pacing.toUpperCase();
          sp.className = 'pacer ' + s.session_pacing;
        } else { sp.textContent = ''; sp.className = 'pacer'; }

        const wp = document.getElementById('week-pacer');
        if (s.week_pacing) {
          wp.textContent = s.week_pacing.toUpperCase();
          wp.className = 'pacer ' + s.week_pacing;
        } else { wp.textContent = ''; wp.className = 'pacer'; }

        const dot = document.getElementById('ds-dot');
        if (s.deepseek_peak) {
          dot.className = 'ds-indicator peak';
          document.getElementById('ds-label').textContent = 'Peak ' + (s.deepseek_label ?? '');
        } else {
          dot.className = 'ds-indicator offpeak';
          document.getElementById('ds-label').textContent = 'Off-peak';
        }
        document.getElementById('ds-next').textContent = s.next_transition ?? '';

        const app = document.getElementById('app');
        if (s.stale) { app.classList.add('stale'); }
        else { app.classList.remove('stale'); }

        const diagEl = document.getElementById('diagnostic');
        if (s.diagnostic) {
          diagEl.textContent = s.diagnostic;
          diagEl.style.display = 'block';
        } else {
          diagEl.style.display = 'none';
        }
      });
    }
    connect();
  </script>
</body>
</html>
