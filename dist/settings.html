<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px; padding: 16px; color: #d0d0d0;
      background: #222; width: 320px; height: 320px;
    }
    h2 { font-size: 13px; margin-bottom: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
    .window-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .window-row input { width: 50px; background: #333; border: 1px solid #444; color: #d0d0d0; padding: 3px 5px; border-radius: 3px; font-size: 11px; }
    .window-row span { color: #666; font-size: 11px; }
    .window-row .label-text { color: #999; font-size: 10px; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .toggle-row label { margin-bottom: 0; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 18px; transition: .2s; }
    .slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 2px; bottom: 2px; background: #888; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .slider { background: #4a7; }
    .toggle input:checked + .slider:before { transform: translateX(18px); background: #fff; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .actions button { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .btn-primary { background: #4a7; color: #fff; }
    .btn-secondary { background: #444; color: #aaa; }
    .btn-primary:hover { background: #5b8; }
    .btn-secondary:hover { background: #555; }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <div class="field">
    <label>DeepSeek Peak Windows (Beijing Time)</label>
    <div id="windows-container"></div>
  </div>

  <div class="field">
    <label>Refresh Interval (minutes)</label>
    <input type="number" min="1" id="poll-interval" style="width:60px; background:#333; border:1px solid #444; color:#d0d0d0; padding:3px 5px; border-radius:3px; font-size:11px;" />
  </div>

  <div class="field">
    <label>Under Pace Threshold (pp)</label>
    <input type="number" min="1" max="20" id="under-pace-threshold" style="width:60px; background:#333; border:1px solid #444; color:#d0d0d0; padding:3px 5px; border-radius:3px; font-size:11px;" />
  </div>

  <div class="field">
    <label>Over Pace Threshold (pp)</label>
    <input type="number" min="1" max="20" id="over-pace-threshold" style="width:60px; background:#333; border:1px solid #444; color:#d0d0d0; padding:3px 5px; border-radius:3px; font-size:11px;" />
  </div>

  <div class="field">
    <label>Widget Opacity</label>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" min="0.3" max="1.0" step="0.05" id="widget-opacity" style="flex:1;accent-color:#4a7" />
      <span id="opacity-value" style="min-width:32px;color:#999;font-size:11px">92%</span>
    </div>
  </div>

  <div class="toggle-row">
    <label>Enable Codex</label>
    <label class="toggle">
      <input type="checkbox" id="enable-codex" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <label>Auto-launch at login</label>
    <label class="toggle">
      <input type="checkbox" id="auto-launch" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="actions">
    <button class="btn-secondary" id="btn-cancel">Cancel</button>
    <button class="btn-primary" id="btn-save" disabled>Save</button>
  </div>

  <script>
    (function() {
      var T = window.__TAURI__;
      if (!T) return;
      var win = T.window.getCurrentWindow();
      var settingsData = null;
      var snapshot = null;

      function buildSnapshot(data) {
        return {
          enable_codex: data.enable_codex,
          auto_launch: data.auto_launch,
          poll_interval_minutes: data.poll_interval_minutes,
          under_pace_threshold: data.under_pace_threshold,
          over_pace_threshold: data.over_pace_threshold,
          widget_opacity: data.widget_opacity,
          deepseek_windows: JSON.stringify(data.deepseek_windows.map(function(w) { return { start_hour: w.start_hour, end_hour: w.end_hour }; })),
        };
      }

      function currentFormState(data) {
        return {
          enable_codex: document.getElementById('enable-codex').checked,
          auto_launch: document.getElementById('auto-launch').checked,
          poll_interval_minutes: Math.max(1, parseInt(document.getElementById('poll-interval').value) || 1),
          under_pace_threshold: Math.max(1, Math.min(20, parseInt(document.getElementById('under-pace-threshold').value) || 1)),
          over_pace_threshold: Math.max(1, Math.min(20, parseInt(document.getElementById('over-pace-threshold').value) || 1)),
          widget_opacity: parseFloat(document.getElementById('widget-opacity').value),
          deepseek_windows: JSON.stringify(data.deepseek_windows.map(function(w) { return { start_hour: w.start_hour, end_hour: w.end_hour }; })),
        };
      }

      function updateSaveButton(data) {
        var snap = snapshot || buildSnapshot(data);
        var curr = currentFormState(data);
        var dirty = snap.auto_launch !== curr.auto_launch
          || snap.enable_codex !== curr.enable_codex
          || snap.poll_interval_minutes !== curr.poll_interval_minutes
          || snap.under_pace_threshold !== curr.under_pace_threshold
          || snap.over_pace_threshold !== curr.over_pace_threshold
          || snap.widget_opacity !== curr.widget_opacity
          || snap.deepseek_windows !== curr.deepseek_windows;
        document.getElementById('btn-save').disabled = !dirty;
      }

      function setupDirtyTracking(data) {
        document.getElementById('enable-codex').addEventListener('change', function() { updateSaveButton(data); });
        document.getElementById('auto-launch').addEventListener('change', function() { updateSaveButton(data); });
        document.getElementById('poll-interval').addEventListener('input', function() { updateSaveButton(data); });
        document.getElementById('under-pace-threshold').addEventListener('input', function() { updateSaveButton(data); });
        document.getElementById('over-pace-threshold').addEventListener('input', function() { updateSaveButton(data); });
        document.getElementById('widget-opacity').addEventListener('input', function() {
          document.getElementById('opacity-value').textContent = Math.round(parseFloat(this.value) * 100) + '%';
          updateSaveButton(data);
        });
      }

      T.core.invoke('get_settings').then(function(data) {
        settingsData = data;
        renderWindows();
        document.getElementById('enable-codex').checked = data.enable_codex;
        document.getElementById('auto-launch').checked = data.auto_launch;
        document.getElementById('poll-interval').value = data.poll_interval_minutes;
        document.getElementById('under-pace-threshold').value = data.under_pace_threshold;
        document.getElementById('over-pace-threshold').value = data.over_pace_threshold;
        document.getElementById('widget-opacity').value = data.widget_opacity;
        document.getElementById('opacity-value').textContent = Math.round(data.widget_opacity * 100) + '%';
        snapshot = buildSnapshot(data);
        setupDirtyTracking(data);
        updateSaveButton(data);
      });

      function makeHourInput(idx, field, value) {
        var inp = document.createElement('input');
        inp.type = 'number';
        inp.min = '0';
        inp.max = '23';
        inp.value = value;
        inp.dataset.idx = idx;
        inp.dataset.field = field;
        inp.addEventListener('change', function() {
          settingsData.deepseek_windows[idx][field] = parseInt(inp.value);
          updateSaveButton(settingsData);
        });
        return inp;
      }

      function renderWindows() {
        var container = document.getElementById('windows-container');
        container.innerHTML = '';
        settingsData.deepseek_windows.forEach(function(w, i) {
          var row = document.createElement('div');
          row.className = 'window-row';

          var labelSpan = document.createElement('span');
          labelSpan.className = 'label-text';
          labelSpan.textContent = 'Window ' + (i + 1) + ':';

          var toSpan = document.createElement('span');
          toSpan.textContent = 'to';

          var bjtSpan = document.createElement('span');
          bjtSpan.style.color = '#666';
          bjtSpan.style.fontSize = '10px';
          bjtSpan.textContent = 'BJT';

          row.appendChild(labelSpan);
          row.appendChild(makeHourInput(i, 'start_hour', w.start_hour));
          row.appendChild(toSpan);
          row.appendChild(makeHourInput(i, 'end_hour', w.end_hour));
          row.appendChild(bjtSpan);

          container.appendChild(row);
        });
      }

      document.getElementById('btn-save').addEventListener('click', function() {
        settingsData.enable_codex = document.getElementById('enable-codex').checked;
        settingsData.auto_launch = document.getElementById('auto-launch').checked;
        settingsData.poll_interval_minutes = Math.max(1, parseInt(document.getElementById('poll-interval').value) || 1);
        settingsData.under_pace_threshold = Math.max(1, Math.min(20, parseInt(document.getElementById('under-pace-threshold').value) || 1));
        settingsData.over_pace_threshold = Math.max(1, Math.min(20, parseInt(document.getElementById('over-pace-threshold').value) || 1));
        settingsData.widget_opacity = parseFloat(document.getElementById('widget-opacity').value);
        T.core.invoke('save_settings', { settings: settingsData }).then(function() {
          var btn = document.getElementById('btn-save');
          btn.textContent = 'Saved \u2713';
          btn.disabled = true;
          setTimeout(function() { win.close(); }, 800);
        });
      });

      document.getElementById('btn-cancel').addEventListener('click', function() {
        win.close();
      });
    })();
  </script>
</body>
</html>
